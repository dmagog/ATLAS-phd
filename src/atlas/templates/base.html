<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATLAS phd — {% block title %}{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; color: #1a1a1a; }
    header { background: #1a1a2e; color: #fff; padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    nav a { color: #a0b4d0; text-decoration: none; font-size: 0.9rem; padding: 4px 10px; border-radius: 4px; }
    nav a:hover, nav a.active { background: #2a2a4e; color: #fff; }
    nav a.admin-link { color: #fbbf24; }
    nav a.admin-link:hover, nav a.admin-link.active { background: #78350f; color: #fef3c7; }
    .container { max-width: 860px; margin: 0 auto; padding: 24px 16px; }
    .card { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 16px; }
    input, textarea, select { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.95rem; }
    textarea { resize: vertical; min-height: 80px; }
    button { padding: 8px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 500; }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
    .btn-secondary { background: #e5e7eb; color: #374151; }
    .error { color: #dc2626; font-size: 0.85rem; margin-top: 6px; }
    .tag { display: inline-block; background: #dbeafe; color: #1d4ed8; border-radius: 4px; font-size: 0.78rem; padding: 2px 8px; }
    #auth-bar { font-size: 0.85rem; color: #9ca3af; margin-left: auto; }
    #auth-bar button { padding: 4px 12px; font-size: 0.82rem; }
    .hidden { display: none !important; }
  </style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body, {delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}]})"></script>
</head>
<body>
<header>
  <h1>ATLAS phd</h1>
  <nav>
    <a href="/" id="nav-qa">Q&amp;A</a>
    <a href="/self-check" id="nav-sc">Самопроверка</a>
    <a href="/admin" id="nav-admin" class="admin-link">⚙ Материалы</a>
  </nav>
  <span id="auth-bar">
    <span id="user-label"></span>
    <button class="btn-secondary" id="logout-btn" style="margin-left:8px">Выйти</button>
  </span>
</header>
<div class="container">
  <!-- Login modal -->
  <div id="login-overlay" style="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:center;justify-content:center">
    <div class="card" style="width:340px">
      <h2 style="margin-bottom:16px;font-size:1rem">Вход в ATLAS phd</h2>
      <div style="display:flex;flex-direction:column;gap:10px">
        <input id="login-email" type="email" placeholder="Email">
        <input id="login-password" type="password" placeholder="Пароль">
        <div id="login-error" class="error hidden"></div>
        <button class="btn-primary" id="login-btn">Войти</button>
      </div>
    </div>
  </div>

  {% block content %}{% endblock %}
</div>
<script>
// ── Auth ──────────────────────────────────────────────────────────────────────
const TOKEN_KEY = 'atlas_token';
const EMAIL_KEY = 'atlas_email';

function getToken() { return localStorage.getItem(TOKEN_KEY); }
function saveToken(t, e) { localStorage.setItem(TOKEN_KEY, t); localStorage.setItem(EMAIL_KEY, e); }
function clearToken() { localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(EMAIL_KEY); }

function authHeaders() {
  return { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' };
}

async function checkAuth() {
  const token = getToken();
  if (!token) { showLogin(); return; }
  document.getElementById('login-overlay').classList.add('hidden');
  document.getElementById('user-label').textContent = localStorage.getItem(EMAIL_KEY) || '';
  if (typeof onAuthReady === 'function') onAuthReady();
}

function showLogin() {
  document.getElementById('login-overlay').classList.remove('hidden');
}

document.getElementById('login-btn').addEventListener('click', async () => {
  const email = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.classList.add('hidden');
  try {
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email, password: pw}),
    });
    if (!res.ok) { errEl.textContent = 'Неверный email или пароль'; errEl.classList.remove('hidden'); return; }
    const data = await res.json();
    saveToken(data.access_token, email);
    document.getElementById('login-overlay').classList.add('hidden');
    document.getElementById('user-label').textContent = email;
    if (typeof onAuthReady === 'function') onAuthReady();
  } catch(e) { errEl.textContent = 'Ошибка подключения'; errEl.classList.remove('hidden'); }
});

document.getElementById('logout-btn').addEventListener('click', () => {
  clearToken(); showLogin();
});

// Highlight active nav
const path = window.location.pathname;
if (path === '/') document.getElementById('nav-qa').classList.add('active');
if (path === '/self-check') document.getElementById('nav-sc').classList.add('active');
if (path === '/admin') document.getElementById('nav-admin').classList.add('active');

checkAuth();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
