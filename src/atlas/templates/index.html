{% extends "base.html" %}
{% block title %}Q&A{% endblock %}
{% block content %}
<div class="card">
  <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center">
    <label style="font-size:.85rem;color:#6b7280">Режим ответа:</label>
    <select id="profile-select" style="width:auto">
      <option value="detailed">Подробный</option>
      <option value="brief">Краткий</option>
      <option value="study">Учебный</option>
    </select>
  </div>
  <div id="messages" style="min-height:200px;max-height:520px;overflow-y:auto;margin-bottom:12px;display:flex;flex-direction:column;gap:12px"></div>
  <div style="display:flex;gap:8px">
    <textarea id="question-input" placeholder="Задайте вопрос по учебным материалам..." style="flex:1;min-height:48px;max-height:160px"></textarea>
    <button class="btn-primary" id="send-btn" style="align-self:flex-end;white-space:nowrap">Отправить</button>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function renderMsg(role, html, citations=[], requestId=null, questionText=null, answerText=null) {
  const wrap = document.createElement('div');
  wrap.style.cssText = 'padding:12px 14px;border-radius:8px;max-width:88%;line-height:1.55';
  if (role === 'user') {
    wrap.style.background = '#eff6ff';
    wrap.style.alignSelf = 'flex-end';
    wrap.innerHTML = `<div style="font-size:.88rem;color:#6b7280;margin-bottom:4px">Вы</div>${html}`;
  } else {
    wrap.style.background = '#f9fafb';
    wrap.style.border = '1px solid #e5e7eb';
    wrap.style.alignSelf = 'flex-start';
    let citeHtml = '';
    if (citations.length) {
      citeHtml = '<div style="margin-top:10px;font-size:.8rem;color:#6b7280"><b>Источники:</b> '
        + citations.map(c => `<span class="tag">${c.document_title}${c.page ? ', с.'+c.page : ''}</span>`).join(' ')
        + '</div>';
    }
    let feedbackHtml = '';
    if (requestId) {
      feedbackHtml = `<div class="feedback-row" style="margin-top:10px;display:flex;gap:6px;align-items:center">
        <span style="font-size:.75rem;color:#9ca3af">Полезно?</span>
        <button class="fb-btn" title="Да" onclick="sendFeedback(this,'positive','${requestId}',${JSON.stringify(questionText||'')},${JSON.stringify(answerText||'')})">👍</button>
        <button class="fb-btn" title="Нет" onclick="sendFeedback(this,'negative','${requestId}',${JSON.stringify(questionText||'')},${JSON.stringify(answerText||'')})">👎</button>
      </div>`;
    }
    wrap.innerHTML = `<div style="font-size:.88rem;color:#6b7280;margin-bottom:4px">ATLAS</div>${html}${citeHtml}${feedbackHtml}`;
  }
  const msgs = document.getElementById('messages');
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
  if (window.renderMathInElement) renderMathInElement(wrap);
}

async function sendFeedback(btn, rating, requestId, questionText, answerText) {
  const row = btn.closest('.feedback-row');
  try {
    await fetch('/qa/feedback', {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({ request_id: requestId, rating, question_text: questionText, answer_markdown: answerText }),
    });
  } catch(_) {}
  row.innerHTML = '<span style="font-size:.75rem;color:#9ca3af">Спасибо за оценку!</span>';
}

function mdToHtml(text) {
  // Very minimal markdown: bold, italic, code, newlines
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<b>$1</b>')
    .replace(/\*(.+?)\*/g,'<i>$1</i>')
    .replace(/`([^`]+)`/g,'<code style="background:#f3f4f6;padding:1px 4px;border-radius:3px">$1</code>')
    .replace(/\n/g,'<br>');
}

const QA_STEPS = [
  '🔍 Ищу релевантные фрагменты…',
  '📚 Анализирую источники…',
  '✍️ Формирую ответ…',
  '🔎 Проверяю точность…',
];

function showTyping() {
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.style.cssText = 'padding:12px 14px;border-radius:8px;max-width:88%;line-height:1.55;background:#f9fafb;border:1px solid #e5e7eb;align-self:flex-start';
  const stepEl = document.createElement('span');
  stepEl.style.cssText = 'font-size:.88rem;color:#6b7280';
  wrap.innerHTML = '<div style="font-size:.88rem;color:#6b7280;margin-bottom:6px">ATLAS</div>';
  wrap.appendChild(stepEl);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;

  let idx = 0;
  stepEl.textContent = QA_STEPS[0];
  wrap._stepTimer = setInterval(() => {
    idx = (idx + 1) % QA_STEPS.length;
    stepEl.textContent = QA_STEPS[idx];
    msgs.scrollTop = msgs.scrollHeight;
  }, 4000);
  return wrap;
}

function removeTyping(wrap) {
  if (wrap && wrap._stepTimer) clearInterval(wrap._stepTimer);
  if (wrap && wrap.parentNode) wrap.parentNode.removeChild(wrap);
}

// Session conversation history: [{role, content}]
const conversationHistory = [];
const MAX_HISTORY = 10; // keep last 10 messages (5 turns)

async function sendQuestion() {
  const input = document.getElementById('question-input');
  const q = input.value.trim();
  if (!q) return;
  input.value = '';
  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  btn.textContent = '…';
  renderMsg('user', mdToHtml(q));
  const typingEl = showTyping();
  try {
    const res = await fetch('/qa/message', {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({
        message_text: q,
        response_profile: document.getElementById('profile-select').value,
        conversation_history: conversationHistory.slice(-MAX_HISTORY),
      }),
    });
    if (checkUnauthorized(res)) { removeTyping(typingEl); btn.disabled = false; btn.textContent = 'Отправить'; return; }
    const data = await res.json();
    removeTyping(typingEl);
    if (data.status === 'answered') {
      const answerText = data.answer_markdown || '';
      renderMsg('atlas', mdToHtml(answerText), data.citations || [], data.request_id, q, answerText);
      // Save to session history
      conversationHistory.push({ role: 'user', content: q });
      conversationHistory.push({ role: 'assistant', content: answerText });
    } else {
      const msg = data.refusal_message || 'Не удалось получить ответ.';
      renderMsg('atlas', `<span style="color:#dc2626">${mdToHtml(msg)}</span>`);
    }
  } catch(e) {
    removeTyping(typingEl);
    renderMsg('atlas', '<span style="color:#dc2626">Ошибка соединения.</span>');
  }
  btn.disabled = false;
  btn.textContent = 'Отправить';
  input.focus();
}

document.getElementById('send-btn').addEventListener('click', sendQuestion);
document.getElementById('question-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); }
});

function onAuthReady() {}
</script>
{% endblock %}
