{% extends "base.html" %}
{% block title %}Самопроверка{% endblock %}
{% block content %}
<div class="card" id="start-card">
  <h2 style="font-size:1rem;margin-bottom:14px">Самопроверка по теме</h2>
  <div style="display:flex;gap:8px">
    <input id="topic-input" placeholder="Введите тему (например: «Метод наименьших квадратов»)">
    <select id="lang-select" style="width:auto">
      <option value="ru">RU</option>
      <option value="en">EN</option>
    </select>
    <button class="btn-primary" id="start-btn" style="white-space:nowrap">Начать</button>
  </div>
  <div id="start-error" class="error hidden"></div>
</div>

<div id="questions-card" class="card hidden">
  <h2 style="font-size:1rem;margin-bottom:14px">Вопросы по теме: <span id="topic-label"></span></h2>
  <div id="questions-list" style="display:flex;flex-direction:column;gap:16px"></div>
  <button class="btn-primary" id="submit-btn" style="margin-top:16px">Отправить ответы</button>
  <div id="submit-error" class="error hidden"></div>
</div>

<div id="results-card" class="card hidden">
  <h2 style="font-size:1rem;margin-bottom:14px">Результаты</h2>
  <div id="score-display" style="font-size:2rem;font-weight:700;color:#2563eb;margin-bottom:4px"></div>
  <div id="score-bar" style="height:8px;background:#e5e7eb;border-radius:4px;margin-bottom:16px">
    <div id="score-fill" style="height:100%;background:#2563eb;border-radius:4px;transition:width .4s"></div>
  </div>
  <div id="criteria-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px"></div>
  <div id="feedback-text" style="font-size:.9rem;line-height:1.6;color:#374151;margin-bottom:10px"></div>
  <div id="error-tags" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px"></div>
  <button class="btn-secondary" id="restart-btn">Новая проверка</button>
</div>
{% endblock %}
{% block scripts %}
<script>
let currentAttemptId = null;
let currentQuestions = [];

document.getElementById('start-btn').addEventListener('click', async () => {
  const topic = document.getElementById('topic-input').value.trim();
  if (!topic) return;
  const btn = document.getElementById('start-btn');
  const errEl = document.getElementById('start-error');
  btn.disabled = true; errEl.classList.add('hidden');
  try {
    const res = await fetch('/self-check/start', {
      method: 'POST', headers: authHeaders(),
      body: JSON.stringify({topic, language: document.getElementById('lang-select').value}),
    });
    if (!res.ok) { errEl.textContent = 'Ошибка генерации вопросов.'; errEl.classList.remove('hidden'); btn.disabled=false; return; }
    const data = await res.json();
    currentAttemptId = data.attempt_id;
    currentQuestions = data.questions;
    renderQuestions(data.questions, topic);
    document.getElementById('start-card').classList.add('hidden');
    document.getElementById('questions-card').classList.remove('hidden');
  } catch(e) { errEl.textContent = 'Ошибка соединения.'; errEl.classList.remove('hidden'); }
  btn.disabled = false;
});

function renderQuestions(questions, topic) {
  document.getElementById('topic-label').textContent = topic;
  const container = document.getElementById('questions-list');
  container.innerHTML = '';
  questions.forEach((q, i) => {
    const div = document.createElement('div');
    div.style.cssText = 'border:1px solid #e5e7eb;border-radius:8px;padding:14px';
    let inner = `<div style="font-weight:500;margin-bottom:8px">${i+1}. ${q.prompt}</div>`;
    if (q.type === 'multiple_choice') {
      inner += q.options.map(opt =>
        `<label style="display:block;margin:4px 0;cursor:pointer">
          <input type="radio" name="q_${q.question_id}" value="${opt.charAt(0)}" style="width:auto;margin-right:6px">${opt}
        </label>`
      ).join('');
    } else {
      inner += `<textarea data-qid="${q.question_id}" placeholder="Ваш ответ..." style="margin-top:6px"></textarea>`;
    }
    div.innerHTML = inner;
    container.appendChild(div);
  });
}

document.getElementById('submit-btn').addEventListener('click', async () => {
  const btn = document.getElementById('submit-btn');
  const errEl = document.getElementById('submit-error');
  btn.disabled = true; errEl.classList.add('hidden');

  const answers = currentQuestions.map(q => {
    let answer_text = '';
    if (q.type === 'multiple_choice') {
      const sel = document.querySelector(`input[name="q_${q.question_id}"]:checked`);
      answer_text = sel ? sel.value : '';
    } else {
      const ta = document.querySelector(`textarea[data-qid="${q.question_id}"]`);
      answer_text = ta ? ta.value.trim() : '';
    }
    return {question_id: q.question_id, answer_text};
  });

  try {
    const res = await fetch(`/self-check/${currentAttemptId}/submit`, {
      method: 'POST', headers: authHeaders(),
      body: JSON.stringify(answers),
    });
    if (!res.ok) { errEl.textContent = 'Ошибка оценки.'; errEl.classList.remove('hidden'); btn.disabled=false; return; }
    const data = await res.json();
    renderResults(data);
    document.getElementById('questions-card').classList.add('hidden');
    document.getElementById('results-card').classList.remove('hidden');
  } catch(e) { errEl.textContent = 'Ошибка соединения.'; errEl.classList.remove('hidden'); }
  btn.disabled = false;
});

function renderResults(data) {
  const score = data.overall_score.toFixed(1);
  document.getElementById('score-display').textContent = `${score} / 5`;
  document.getElementById('score-fill').style.width = (data.overall_score / 5 * 100) + '%';

  const cs = data.criterion_scores;
  const labels = {correctness:'Точность', completeness:'Полнота', logic:'Логика', terminology:'Терминология'};
  const weights = {correctness:'40%', completeness:'30%', logic:'20%', terminology:'10%'};
  document.getElementById('criteria-grid').innerHTML = Object.keys(labels).map(k =>
    `<div style="background:#f9fafb;border-radius:6px;padding:10px">
      <div style="font-size:.78rem;color:#6b7280">${labels[k]} (${weights[k]})</div>
      <div style="font-size:1.2rem;font-weight:600">${(cs[k]||0).toFixed(1)}</div>
    </div>`
  ).join('');

  document.getElementById('feedback-text').textContent = data.evaluator_summary || '';

  const tags = data.error_tags || [];
  document.getElementById('error-tags').innerHTML = tags.map(t =>
    `<span class="tag" style="background:#fef3c7;color:#92400e">${t}</span>`
  ).join('');
}

document.getElementById('restart-btn').addEventListener('click', () => {
  document.getElementById('results-card').classList.add('hidden');
  document.getElementById('start-card').classList.remove('hidden');
  document.getElementById('questions-card').innerHTML = '';
  document.getElementById('topic-input').value = '';
  currentAttemptId = null;
  currentQuestions = [];
});

function onAuthReady() {}
</script>
{% endblock %}
