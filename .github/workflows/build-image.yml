name: Build & push app image

# Roadmap §M6.A: «Image build: GitHub Actions на push в main → собирает образ →
# пушит в GHCR с тегом {commit_sha} и latest. Сам build автоматизирован,
# деплой — нет.»

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "alembic/**"
      - "pyproject.toml"
      - "docker/app.Dockerfile"
      - ".github/workflows/build-image.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/atlas-phd-app

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tags:
          #   - latest        — для convenience pull'а в dev
          #   - sha-<7chars>  — для воспроизводимого pin'а в prod .env
          #   - sha-<full>    — на случай 7-char коллизии в долгом репо
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
            type=sha,prefix=sha-,format=long

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/app.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
